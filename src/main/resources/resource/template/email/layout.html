<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6f8; padding:20px;">
    <tr>
        <td align="center">

            <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:10px; overflow:hidden;">

                <!-- Header -->
                <tr>
                    <td style="background:#2c3e50; color:#ffffff; padding:20px; text-align:center;">
                        <h2 style="margin:0;" th:text="${title}">Notification</h2>
                    </td>
                </tr>

                <!-- Body -->
                <tr>
                    <td style="padding:30px;">
                        <div th:replace="${contentTemplate} :: content"></div>
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="background:#f8f9fa; padding:15px; text-align:center; font-size:12px; color:#888;">
                        © 2026 Loan Service • This is an automated email
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
