<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="margin:0; padding:0; background:#f6f7f9; font-family:Arial, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="padding:30px 10px;">
    <tr>
        <td align="center">

            <table width="520" cellpadding="0" cellspacing="0"
                   style="background:#ffffff; border-radius:6px; padding:24px;">

                <!-- Title -->
                <tr>
                    <td>
                        <h2 style="margin:0 0 10px 0; color:#333;" th:text="${title}">
                            Information
                        </h2>
                    </td>
                </tr>

                <!-- Divider -->
                <tr>
                    <td>
                        <hr style="border:none; border-top:1px solid #eee; margin:10px 0 20px;">
                    </td>
                </tr>

                <!-- Body -->
                <tr>
                    <td style="color:#444; font-size:14px; line-height:1.6;">

                        <p style="margin-top:0;">
                            Hi <span th:text="${name}">User</span>,
                        </p>

                        <p th:text="${message}">
                            This is a general informational email.
                        </p>

                        <!-- Optional extra content -->
                        <div th:if="${extra != null}" th:utext="${extra}"></div>

                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="padding-top:25px; font-size:12px; color:#999;">
                        <p style="margin:0;">
                            If you have any questions, feel free to reach out.
                        </p>
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
